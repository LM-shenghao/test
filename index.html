<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的网站</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    /* ===== 日期时间样式 ===== */
    #datetime {
      text-align: center;
      font-size: 1.2rem;
      margin: 1rem 0;
      color: var(--text-secondary);
    }

    /* ===== 2048 游戏容器样式 ===== */
    .game-container {
      margin: 2rem auto;
      max-width: 500px;
      padding: 1rem;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }
    .game-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .game-header h2 {
      margin: 0;
      font-size: 1.3rem;
      color: var(--text-color);
    }
    .game-score {
      font-size: 1.2rem;
      font-weight: bold;
      color: var(--link-color);
    }
    .game-board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      background: #bbada0;
      padding: 8px;
      border-radius: 6px;
      margin-bottom: 0.5rem;
    }
    .game-board div {
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: bold;
      border-radius: 4px;
      background: #cdc1b4;
      color: #776e65;
      transition: all 0.15s ease;
    }
    /* 不同数字的底色（保持与经典2048一致） */
    .game-board div[data-value="2"]    { background: #eee4da; }
    .game-board div[data-value="4"]    { background: #ede0c8; }
    .game-board div[data-value="8"]    { background: #f2b179; color: #f9f6f2; }
    .game-board div[data-value="16"]   { background: #f59563; color: #f9f6f2; }
    .game-board div[data-value="32"]   { background: #f67c5f; color: #f9f6f2; }
    .game-board div[data-value="64"]   { background: #f65e3b; color: #f9f6f2; }
    .game-board div[data-value="128"]  { background: #edcf72; color: #f9f6f2; font-size: 1.3rem; }
    .game-board div[data-value="256"]  { background: #edcc61; color: #f9f6f2; font-size: 1.3rem; }
    .game-board div[data-value="512"]  { background: #edc850; color: #f9f6f2; font-size: 1.3rem; }
    .game-board div[data-value="1024"] { background: #edc53f; color: #f9f6f2; font-size: 1.1rem; }
    .game-board div[data-value="2048"] { background: #edc22e; color: #f9f6f2; font-size: 1.1rem; }
    .game-board div[data-value="4096"] { background: #3c3a32; color: #f9f6f2; font-size: 1rem; }
    .game-info {
      text-align: center;
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-top: 0.5rem;
    }
    /* 暗黑模式下的游戏容器调整 */
    body.dark .game-container {
      background: var(--card-bg);
      border-color: var(--border-color);
    }
    body.dark .game-board {
      background: #5a4f46;
    }
    body.dark .game-board div {
      background: #6e645a;
      color: #ddd;
    }
  </style>
</head>
<body>
  <h1>首页</h1>

  <ul class="home-list">
    <li><a href="./">首页</a></li>
    <li><a href="./about.html">关于</a></li>
    <li><a href="./projects/project-test.html">test</a></li>
    <li><a href="./projects/project-b.html">视频</a></li>   
  </ul>

  <p>欢迎来到我的个人网站～</p>


  <div id="datetime"></div>


  <div class="game-container">
    <div class="game-header">
      <h2>🎮 2048</h2>
      <span class="game-score">分数：<span id="score">0</span></span>
    </div>
    <div class="game-board" id="board"></div>
    <div class="game-info">使用方向键 ↑ ↓ ← → 移动方块，合并相同数字达到 2048！</div>
  </div>

  <button id="theme-toggle" class="theme-toggle">🌙</button>
  <script src="./script.js"></script>

  <script>
    // ===== 1. 实时日期时间 =====
    function updateDateTime() {
      const now = new Date();
      const str = now.toLocaleString('zh-CN', { 
        year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit',
        hour12: false 
      });
      document.getElementById('datetime').textContent = '🕒 ' + str;
    }
    updateDateTime();
    setInterval(updateDateTime, 1000);

    // ===== 2. 2048 游戏逻辑 =====
    (function() {
      const boardEl = document.getElementById('board');
      const scoreEl = document.getElementById('score');
      let board = [];
      let score = 0;

      // 初始化
      function init() {
        board = Array(4).fill().map(() => Array(4).fill(0));
        score = 0;
        addRandomTile();
        addRandomTile();
        render();
      }

      // 添加随机方块
      function addRandomTile() {
        const empty = [];
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            if (board[r][c] === 0) empty.push([r, c]);
          }
        }
        if (empty.length === 0) return;
        const [r, c] = empty[Math.floor(Math.random() * empty.length)];
        board[r][c] = Math.random() < 0.9 ? 2 : 4;
      }

      // 渲染
      function render() {
        boardEl.innerHTML = '';
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            const cell = document.createElement('div');
            const val = board[r][c];
            cell.textContent = val || '';
            if (val) cell.setAttribute('data-value', val);
            boardEl.appendChild(cell);
          }
        }
        scoreEl.textContent = score;
      }

      // 移动并合并
      function move(direction) {
        let moved = false;
        const oldBoard = board.map(row => [...row]);

        // 方向处理
        if (direction === 'left') {
          for (let r = 0; r < 4; r++) {
            let row = board[r].filter(v => v);
            for (let i = 0; i < row.length - 1; i++) {
              if (row[i] === row[i+1]) {
                row[i] *= 2;
                score += row[i];
                row.splice(i+1, 1);
                row.push(0);
              }
            }
            while (row.length < 4) row.push(0);
            board[r] = row;
          }
        } else if (direction === 'right') {
          for (let r = 0; r < 4; r++) {
            let row = board[r].filter(v => v);
            for (let i = row.length - 1; i > 0; i--) {
              if (row[i] === row[i-1]) {
                row[i] *= 2;
                score += row[i];
                row.splice(i-1, 1);
                row.unshift(0);
                i--;
              }
            }
            while (row.length < 4) row.unshift(0);
            board[r] = row;
          }
        } else if (direction === 'up') {
          for (let c = 0; c < 4; c++) {
            let col = [];
            for (let r = 0; r < 4; r++) col.push(board[r][c]);
            col = col.filter(v => v);
            for (let i = 0; i < col.length - 1; i++) {
              if (col[i] === col[i+1]) {
                col[i] *= 2;
                score += col[i];
                col.splice(i+1, 1);
                col.push(0);
              }
            }
            while (col.length < 4) col.push(0);
            for (let r = 0; r < 4; r++) board[r][c] = col[r];
          }
        } else if (direction === 'down') {
          for (let c = 0; c < 4; c++) {
            let col = [];
            for (let r = 0; r < 4; r++) col.push(board[r][c]);
            col = col.filter(v => v);
            for (let i = col.length - 1; i > 0; i--) {
              if (col[i] === col[i-1]) {
                col[i] *= 2;
                score += col[i];
                col.splice(i-1, 1);
                col.unshift(0);
                i--;
              }
            }
            while (col.length < 4) col.unshift(0);
            for (let r = 0; r < 4; r++) board[r][c] = col[r];
          }
        }

        // 检查是否有变化
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            if (board[r][c] !== oldBoard[r][c]) moved = true;
          }
        }

        if (moved) {
          addRandomTile();
          render();
          if (checkGameOver()) {
            alert('游戏结束！你的分数：' + score);
            init();
          }
        }
      }

      function checkGameOver() {
        for (let r = 0; r < 4; r++) {
          for (let c = 0; c < 4; c++) {
            if (board[r][c] === 0) return false;
            if (c < 3 && board[r][c] === board[r][c+1]) return false;
            if (r < 3 && board[r][c] === board[r+1][c]) return false;
          }
        }
        return true;
      }

      // 键盘
      window.addEventListener('keydown', function(e) {
        if (e.key.startsWith('Arrow')) {
          e.preventDefault();
          const map = {
            'ArrowUp': 'up',
            'ArrowDown': 'down',
            'ArrowLeft': 'left',
            'ArrowRight': 'right'
          };
          move(map[e.key]);
        }
      });

      // 支持触摸滑动！
      let touchStartX = 0, touchStartY = 0;
      boardEl.addEventListener('touchstart', function(e) {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
      });
      boardEl.addEventListener('touchend', function(e) {
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 30) {
          move(dx > 0 ? 'right' : 'left');
        } else if (Math.abs(dy) > 30) {
          move(dy > 0 ? 'down' : 'up');
        }
      });

      // 启动游戏！
      init();
    })();
  </script>
</body>
</html>
